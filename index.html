<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --c1: #c084fc;
  --c2: #d946ef;
  --glowBtn: rgba(147,51,234,.6);
  --glowBtnHov: rgba(147,51,234,.8);
}

html, body {
  width:100%; height:100%;
  font-family:'Tajawal',sans-serif;
  background:#05030a;
  color:#f0ecff;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}

/* خلفية متحركة بالكامل (عشان الصفحة متكونش ميتة وستاتيك) */
.bg-layer { position:fixed; inset:0; z-index:0; pointer-events:none; }
.bg-grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(147,51,234,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(147,51,234,.04) 1px, transparent 1px);
  background-size:30px 30px;
  animation: bg-pan 20s linear infinite;
}
.orb {
  position:absolute; border-radius:50%; filter:blur(70px); opacity:0.45;
  animation: float-orb 10s infinite ease-in-out alternate;
}
.orb-1 { width:350px; height:350px; background:#9333ea; top:-15%; left:-10%; animation-duration:12s; }
.orb-2 { width:250px; height:250px; background:#d946ef; bottom:-10%; right:-10%; animation-duration:15s; animation-delay:-5s; }
.orb-3 { width:200px; height:200px; background:#7c3aed; top:40%; left:50%; animation-duration:18s; animation-delay:-2s; }

/* ── الصفحة ── */
.page {
  position:relative; z-index:1;
  height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:0 24px;
  text-align:center;
  gap:0;
}

/* الأيقونة SVG - ثابتة وواضحة جداً بس بتعمل عومان (Floating) */
.gift-svg-container {
  margin-bottom: 22px;
  filter: drop-shadow(0 10px 25px rgba(217,70,239,.4));
  animation: float-gift 3.5s ease-in-out infinite;
}
.gift-svg {
  width: clamp(80px, 25vw, 110px);
  height: auto;
}

/* العنوان */
h1 {
  font-size:clamp(32px,9vw,52px);
  font-weight:900;
  line-height:1.15;
  letter-spacing:-1px;
  margin-bottom:10px;
  background:linear-gradient(135deg, #fff 0%, var(--c1) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}

/* السطر الثاني */
.sub {
  font-size:clamp(14px,4vw,17px);
  color:#7c6fa0;
  margin-bottom:36px;
  line-height:1.7;
}
.sub strong { color:var(--c1); font-weight:700; }

/* الزر */
.btn {
  display:flex; align-items:center; justify-content:center; gap:12px;
  width:100%; max-width:380px;
  background:linear-gradient(135deg,#7c3aed 0%,#9333ea 50%,#d946ef 100%);
  background-size:200% 100%;
  color:#fff;
  padding:clamp(18px,5vw,24px) 28px;
  border-radius:18px;
  font-family:'Tajawal',sans-serif;
  font-size:clamp(18px,5vw,22px);
  font-weight:900;
  border:none; cursor:pointer;
  text-decoration:none;
  box-shadow:0 14px 55px var(--glowBtn), 0 2px 0 rgba(255,255,255,.15) inset;
  transition:transform .18s cubic-bezier(.22,1,.36,1), box-shadow .18s, background-position .4s;
  position:relative; overflow:hidden;
  animation:glow 2.6s ease-in-out infinite;
}
.btn::before {
  content:'';
  position:absolute; top:0; left:-140%; width:50%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
  animation:shine 2.4s .5s infinite;
}
.btn::after {
  content:'';
  position:absolute; inset:-5px;
  border-radius:23px;
  border:2px solid var(--glowBtnHov);
  animation:ring 2.2s ease-in-out infinite;
  pointer-events:none;
}
.btn:hover { transform:translateY(-3px); background-position:100%; box-shadow:0 22px 65px var(--glowBtnHov),0 2px 0 rgba(255,255,255,.15) inset; }
.btn:active { transform:scale(0.97); }
.btn-icon { width:24px; height:24px; pointer-events:none; flex-shrink:0; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.btn-txt  { pointer-events:none; }

/* العداد */
.timer {
  margin-top:14px;
  font-size:12px; color:#4a3d68; font-weight:600;
}
.timer b { color:var(--c1); }

/* privacy */
.priv {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  z-index:1; font-size:11px; color:rgba(124,111,160,.4);
  text-decoration:none; transition:color .2s;
}
.priv:hover { color:#7c6fa0; }

/* ═══════════════ EXIT POPUP ═══════════════ */
.overlay {
  display:none;
  position:fixed; inset:0; z-index:9999;
  background:rgba(4,2,14,.9);
  backdrop-filter:blur(8px);
  align-items:center; justify-content:center;
  padding:20px;
}
.overlay.show { display:flex; }

.popup {
  width:100%; max-width:330px;
  background:linear-gradient(155deg,#110b26,#1a1037);
  border:1px solid rgba(147,51,234,.38);
  border-radius:22px;
  padding:30px 22px 24px;
  text-align:center;
  position:relative;
  box-shadow:0 30px 80px rgba(147,51,234,.3);
  animation:pop-in .35s cubic-bezier(.22,1,.36,1) both;
}
.popup::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  border-radius:22px 22px 0 0;
  background:linear-gradient(90deg,transparent,#9333ea,#d946ef,transparent);
}
.pop-close {
  position:absolute; top:13px; left:13px;
  width:28px; height:28px; border-radius:50%;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; cursor:pointer; color:#7c6fa0;
  transition:all .2s;
}
.pop-close:hover { background:rgba(255,255,255,.12); color:#fff; }

.pop-icon-svg {
  width: 48px; height: 48px;
  margin-bottom: 12px;
  fill: none;
  stroke: #d946ef;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  animation: shake .4s .1s both;
}

.pop-title {
  font-size:clamp(18px,5.5vw,22px);
  font-weight:900; line-height:1.2; margin-bottom:8px;
  background:linear-gradient(135deg,#fff,#e9d5ff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}

.pop-body { font-size:14px; color:#7c6fa0; line-height:1.7; margin-bottom:18px; }
.pop-body strong { color:#e9d5ff; }

.pop-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%;
  background:linear-gradient(135deg,#7c3aed,#9333ea,#d946ef);
  color:#fff; padding:16px 20px;
  border-radius:13px;
  font-family:'Tajawal',sans-serif;
  font-size:clamp(15px,4.5vw,18px); font-weight:900;
  border:none; cursor:pointer; text-decoration:none;
  box-shadow:0 8px 35px rgba(147,51,234,.45);
  transition:transform .18s, box-shadow .18s;
  position:relative; overflow:hidden;
}
.pop-btn::before {
  content:'';
  position:absolute; top:0; left:-140%; width:50%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  animation:shine 2.2s .3s infinite;
}
.pop-btn:hover { transform:translateY(-2px); box-shadow:0 14px 45px rgba(147,51,234,.62); }
.pop-btn:active { transform:scale(0.97); }
.pop-btn-icon { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}

.pop-skip {
  display:block; margin-top:12px;
  font-size:11px; color:rgba(124,111,160,.45);
  cursor:pointer; background:none; border:none;
  font-family:'Tajawal',sans-serif;
  text-decoration:underline; text-underline-offset:3px;
  transition:color .2s;
}
.pop-skip:hover { color:#7c6fa0; }

/* ── animations ── */
@keyframes bg-pan     { 0%{background-position:0 0} 100%{background-position:30px 30px} }
@keyframes float-orb  { 0% {transform: translate(0, 0) scale(1);} 100% {transform: translate(30px, -40px) scale(1.1);} }
@keyframes float-gift { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes glow       { 0%,100%{box-shadow:0 14px 55px var(--glowBtn),0 2px 0 rgba(255,255,255,.15) inset} 50%{box-shadow:0 20px 70px var(--glowBtnHov),0 2px 0 rgba(255,255,255,.15) inset} }
@keyframes shine      { 0%{left:-140%} 100%{left:230%} }
@keyframes ring       { 0%,100%{opacity:0;transform:scale(1)} 50%{opacity:1;transform:scale(1.025)} }
@keyframes pop-in     { from{opacity:0;transform:scale(.86) translateY(22px)} to{opacity:1;transform:scale(1) translateY(0)} }
@keyframes shake      { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-9deg)} 40%{transform:rotate(9deg)} 60%{transform:rotate(-5deg)} 80%{transform:rotate(5deg)} }
</style>
</head>

<body>

<!-- خلفية متحركة -->
<div class="bg-layer">
  <div class="orb orb-1"></div>

<!-- EXIT POPUP -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true">

<!-- PAGE -->
<div class="page">

  <!-- أيقونة هدية مليانة وثابتة بس بتطوف في مكانها -->
  <div class="gift-svg-container">
    <svg class="gift-svg" viewBox="0 0 24 24">
      <defs>
        <linearGradient id="giftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#c084fc"/>
          <stop offset="100%" stop-color="#d946ef"/>
        </linearGradient>
      </defs>
      <path fill="url(#giftGrad)" d="M22 6h-4.5c.3-.3.5-.8.5-1.5 0-1.9-2.2-3.5-4.5-2.5-1.1.5-1.5 1.4-1.5 2 0-.6-.4-1.5-1.5-2-2.3-1-4.5.6-4.5 2.5 0 .7.2 1.2.5 1.5H2v5h2v11h16V11h2V6zm-10-1.5c0-.6 1.3-1.5 2.5-.9.8.4.8 1.4.2 1.9L12 7.5V4.5zm-3.2-.9c1.2-.6 2.5.3 2.5.9v3L8.6 5.5c-.6-.5-.6-1.5.2-1.9zM4 8h7v2H4V8zm2 13v-9h5v9H6zm7 0v-9h5v9h-5zm7-11h-7V8h7v2z"/>

  </div>

    <svg class="btn-icon" viewBox="0 0 24 24">
      <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <span class="btn-txt">سجل الان واحصل علي اللفات المجانيه !</span>
  </a>

  <div class="timer">⏳ الجايزة متاحة لمدة: <b id="timerVal">--:--</b></div>

</div>

<a class="priv" href="privacy.html" id="privacyLink">سياسة الخصوصية</a>

<script>
/* ANALYTICS */
function trackEvent(name, params) {
  console.log('[GA]', name, params || '');
  if (typeof gtag === 'function') gtag('event', name, params || {});
}

/* COUNTDOWN */
function startCountdown() {
  var mins = 38 + Math.floor(Math.random() * 18);
  var secs = Math.floor(Math.random() * 59);
  function fmt() { return String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0'); }
  function tick() {
    var el = document.getElementById('timerVal');
    if (el) el.textContent = fmt();
    if (secs <= 0) {
      if (mins <= 0) { trackEvent('Urgency_Timer_Expired', { event_category: 'Engagement' }); return; }
      mins--; secs = 59;
    } else { secs--; }
    setTimeout(tick, 1000);
  }
  tick();
}

/* CTA EVENTS */
function initCTA() {
  var btn = document.getElementById('btnMain');
  var privLink = document.getElementById('privacyLink');
  
  if (!btn) return;
  var maxScroll = 0;
  window.addEventListener('scroll', function() {
    var depth = Math.round((window.scrollY / Math.max(document.body.scrollHeight - window.innerHeight, 1)) * 100);
    if (depth > maxScroll) maxScroll = depth;
  }, { passive: true });

  btn.addEventListener('click', function() {
    trackEvent('CTA_Click',      { event_category: 'Engagement', event_label: 'Main_CTA_Button', value: 1 });
    trackEvent('Telegram_Click', { event_category: 'Engagement', event_label: 'affiliate_cta',   value: 1 });
    trackEvent('Offer_Click',    { event_category: 'Conversion', event_label: 'offer_plus_bonuses_plus_game', scroll_depth: maxScroll, value: 1 });
  });

  if (privLink) {
    privLink.addEventListener('click', function() {
      trackEvent('Privacy_Click', { event_category: 'Navigation', event_label: 'Footer_Privacy_Link' });
    });
  }
}

/* SECTION TRACKING */
function initSectionTracking() {
  if (!('IntersectionObserver' in window)) return;
  var io = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting && e.target.dataset.track) {
        trackEvent(e.target.dataset.track, { event_category: 'Visibility' });
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.5 });
  var el = document.getElementById('btnMain');
  if (el) { el.dataset.track = 'CTA_Button_Visible'; io.observe(el); }
}

/* EXIT INTENT */
function initExitIntent() {
  var overlay = document.getElementById('overlay');
  var shown   = false;

  function show() {
    if (shown) return;
    shown = true;
    overlay.classList.add('show');
    trackEvent('Exit_Intent_Shown', { event_category: 'Engagement', event_label: 'Exit_Popup' });
  }
  function hide() {
    overlay.classList.remove('show');
    trackEvent('Exit_Intent_Closed', { event_category: 'Engagement', event_label: 'Exit_Popup_Dismissed' });
  }

  document.addEventListener('mouseleave', function(e) { if (e.clientY <= 10) show(); });

  var lastY = 0, upCount = 0;
  window.addEventListener('scroll', function() {
    var y = window.scrollY;
    if (lastY - y > 55) { upCount++; if (upCount >= 2 && y < 100) show(); } else upCount = 0;
    lastY = y;
  }, { passive: true });

  document.getElementById('popClose').addEventListener('click', hide);
  document.getElementById('popSkip').addEventListener('click', function() {
    hide();
    trackEvent('Exit_Intent_Skipped', { event_category: 'Engagement', event_label: 'Exit_Popup_Skip' });
  });
  document.getElementById('btnExit').addEventListener('click', function() {
    trackEvent('CTA_Click',      { event_category: 'Engagement', event_label: 'Exit_Popup_CTA',    value: 1 });
    trackEvent('Telegram_Click', { event_category: 'Engagement', event_label: 'affiliate_cta_exit', value: 1 });
    trackEvent('Offer_Click',    { event_category: 'Conversion', event_label: 'exit_popup_offer',   value: 1 });
  });
  overlay.addEventListener('click', function(e) { if (e.target === overlay) hide(); });
}

/* INIT */
function init() {
  if (!localStorage.getItem('_cid')) {
    localStorage.setItem('_cid', Math.random().toString(36).substr(2,9) + Date.now().toString(36));
  }
  trackEvent('Session_Started', { event_category: 'Engagement', event_label: 'Landing Page loaded' });
  [15, 30, 60].forEach(function(s) {
    setTimeout(function() {
      trackEvent('Time_On_Page', { event_category: 'Engagement', event_label: s + 's', value: s });
    }, s * 1000);
  });
  startCountdown();
  initCTA();
  initSectionTracking();
  initExitIntent();
}

window.addEventListener('DOMContentLoaded', init);
</script>
